spring.application.name=tomato

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:tomatodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console is disabled by default for safety. For local development only,
# run with TOMATO_H2_CONSOLE_ENABLED=true. Never enable this in a deployment
# reachable from the internet - it gives full SQL access to the database.
spring.h2.console.enabled=${TOMATO_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
# The fallback below is for local development only. In any deployed
# environment, set TOMATO_JWT_SECRET to a long random value, e.g.
# `openssl rand -base64 48`. Anyone who knows this secret can forge tokens
# for any user, including ADMIN.
tomato.security.jwt.secret=${TOMATO_JWT_SECRET:tomato-dev-secret-key-change-me-tomato-dev-secret-key}
tomato.security.jwt.expiration-ms=86400000

# Seeds demo accounts (including an admin with a publicly-known password).
# Set TOMATO_SEED_DATA_ENABLED=false in any deployed environment.
tomato.seed-data.enabled=${TOMATO_SEED_DATA_ENABLED:true}

# Rate limiting for /api/auth/login and /api/auth/register, per client IP.
tomato.security.rate-limit.auth.max-requests=${TOMATO_AUTH_RATE_LIMIT_MAX:10}
tomato.security.rate-limit.auth.window-seconds=${TOMATO_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

# Comma-separated list of allowed origins for cross-origin browser requests to
# /api/**, e.g. https://app.example.com. Leave empty if the UI is served from
# the same origin as this API (no CORS needed).
tomato.security.cors.allowed-origins=${TOMATO_CORS_ALLOWED_ORIGINS:}

# Required if this app sits behind a TLS-terminating reverse proxy (nginx,
# Cloudflare, etc.) so Spring correctly detects HTTPS requests (needed for the
# HSTS header and any secure-cookie/redirect logic).
server.forward-headers-strategy=framework

# Logging
logging.level.root=INFO
# Defaults to DEBUG for local development. Set TOMATO_LOG_LEVEL=INFO (or WARN)
# in deployed environments to avoid leaking sensitive data into logs.
logging.level.com.tomato=${TOMATO_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n
